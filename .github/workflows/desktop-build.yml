name: Desktop build

# Builds the native ND3X desktop installers (macOS / Windows / Linux) by combining
# this backend repo with the frontend repo, freezing the backend (PyInstaller) and
# bundling it in the Tauri shell — i.e. ND3X/desktop/build_app.sh on each OS.
#
# Triggers (a "fresh build when FE or BE gets a new version"):
#   - push a tag `v*` here → installers attached to that release
#   - repository_dispatch {type: fe-release} from the frontend repo → FE release
#   - manual run (Actions ▸ Desktop build ▸ Run workflow)
#
# Required repo secret:
#   FE_REPO_TOKEN — a PAT (or fine-grained token) with read access to the private
#                   frontend repo, used to check it out as a sibling.
on:
  workflow_dispatch:
    inputs:
      fe_ref:
        description: "Frontend git ref to build (branch/tag/sha)"
        default: "main"
  push:
    tags: ["v*"]
  repository_dispatch:
    types: [fe-release]

env:
  FE_REPO: nickozz714/lovely-landing-project

# softprops/action-gh-release needs write access to create/attach the release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,      target: aarch64-apple-darwin,        name: macos-arm64 }
          # macOS Intel (macos-13) dropped: GitHub is phasing out Intel runners
          # (they queue indefinitely). Apple Silicon covers modern Macs; Intel
          # Macs run the arm64 build via Rosetta.
          - { os: windows-latest, target: x86_64-pc-windows-msvc,     name: windows-x64 }
          - { os: ubuntu-22.04,  target: x86_64-unknown-linux-gnu,    name: linux-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout backend (ND3X)
        uses: actions/checkout@v4
        with:
          path: ND3X

      - name: Checkout frontend (sibling)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FE_REPO }}
          ref: ${{ github.event.inputs.fe_ref || github.event.client_payload.fe_ref || 'main' }}
          token: ${{ secrets.FE_REPO_TOKEN }}
          path: lovely-landing-project

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: lovely-landing-project/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ND3X/desktop/src-tauri

      - name: Linux build deps (Tauri v2)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Python venv + backend deps
        shell: bash
        run: |
          python -m venv ND3X/.venv
          PY=ND3X/.venv/bin/python; [ -x "$PY" ] || PY=ND3X/.venv/Scripts/python.exe
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install -r ND3X/requirements.txt -r ND3X/packaging/requirements-build.txt

      - name: Frontend deps
        shell: bash
        # npm install (not ci): the repo's primary lockfile is bun's, so the npm
        # package-lock.json drifts; install reconciles from package.json.
        run: cd lovely-landing-project && npm install --no-audit --no-fund

      - name: Set app version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        # So installer filenames track the release (e.g. ND3X_0.1.2_…) instead of
        # the static tauri.conf version.
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          f="ND3X/desktop/src-tauri/tauri.conf.json"
          tmp="$(mktemp)"
          jq --arg v "$TAG" '.version = $v' "$f" > "$tmp" && mv "$tmp" "$f"
          echo "Desktop app version set to $TAG"

      - name: Build desktop app (FE → freeze backend → Tauri bundle)
        shell: bash
        run: bash ND3X/desktop/build_app.sh

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: nd3x-${{ matrix.name }}
          if-no-files-found: ignore
          path: |
            ND3X/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            ND3X/desktop/src-tauri/target/release/bundle/nsis/*.exe
            ND3X/desktop/src-tauri/target/release/bundle/msi/*.msi
            ND3X/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            ND3X/desktop/src-tauri/target/release/bundle/deb/*.deb

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ND3X/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            ND3X/desktop/src-tauri/target/release/bundle/nsis/*.exe
            ND3X/desktop/src-tauri/target/release/bundle/msi/*.msi
            ND3X/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            ND3X/desktop/src-tauri/target/release/bundle/deb/*.deb
