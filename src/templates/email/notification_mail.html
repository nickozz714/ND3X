<!-- app/templates/email/notification_mail.html -->

<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <title>{{ subject }}</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f6f8;font-family:Arial,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f8;padding:40px 0;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,0.08);">
                    <tr>
                        <td style="background:#111827;padding:28px 32px;text-align:center;">
                            <h1 style="margin:0;color:#ffffff;font-size:22px;">
                                {{ title }}
                            </h1>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding:32px;color:#374151;font-size:16px;line-height:1.6;">
                            <p style="margin-top:0;">
                                {{ message }}
                            </p>

                            {% if data %}
                            <table width="100%" cellpadding="10" cellspacing="0" style="margin-top:24px;border-collapse:collapse;background:#f9fafb;border-radius:8px;">
                                {% for key, value in data.items() %}
                                <tr>
                                    <td style="font-weight:bold;color:#111827;width:35%;">
                                        {{ key }}
                                    </td>
                                    <td style="color:#374151;">
                                        {{ value }}
                                    </td>
                                </tr>
                                {% endfor %}
                            </table>
                            {% endif %}

                            {% if action_url %}
                            <p style="margin-top:32px;text-align:center;">
                                <a href="{{ action_url }}" style="display:inline-block;background:#111827;color:#ffffff;text-decoration:none;padding:12px 20px;border-radius:8px;">
                                    Bekijken
                                </a>
                            </p>
                            {% endif %}
                        </td>
                    </tr>

                    <tr>
                        <td style="padding:20px 32px;background:#f9fafb;color:#6b7280;font-size:13px;text-align:center;">
                            Deze notificatie is automatisch verzonden door het systeem.
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
